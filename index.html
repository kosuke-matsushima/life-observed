<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Observed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #globe-container {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 24px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 2px;
    color: #fff;
  }
  header .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }

  /* ── Stats panel ── */
  #stats-panel {
    position: fixed;
    bottom: 80px;
    left: 28px;
    z-index: 10;
    background: rgba(10, 10, 18, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px 24px;
    min-width: 210px;
  }
  #stats-panel h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 14px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .stat-row .label { color: rgba(255,255,255,0.5); font-weight: 300; }
  .stat-row .value { font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
  .stat-row .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
  .stat-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 12px 0; }

  /* ── Loading indicator ── */
  #loading-indicator {
    position: fixed;
    top: 28px; right: 28px;
    z-index: 10;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    display: none;
    align-items: center;
    gap: 8px;
  }
  #loading-indicator .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══════════════════════════════
     Period selector bar
     ══════════════════════════════ */
  #period-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 12;
    background: rgba(6, 6, 14, 0.82);
    backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #period-bar .period-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  #period-bar .period-btn {
    padding: 7px 16px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.45);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  #period-bar .period-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
  }
  #period-bar .period-btn.active {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    color: #fff;
  }

  #period-bar .period-date-input {
    padding: 7px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.25s;
  }
  #period-bar .period-date-input:focus { border-color: rgba(255,255,255,0.3); }
  #period-bar .period-date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

  #period-bar .separator {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.08);
    margin: 0 4px;
  }

  #period-bar .record-count {
    margin-left: auto;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
  }
  #period-bar .record-count strong {
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }

  /* ══════════════════════════════
     Info panel (detail sidebar)
     ══════════════════════════════ */
  #info-overlay {
    position: fixed;
    inset: 0;
    z-index: 15;
    display: none;
  }
  #info-overlay.visible { display: block; }

  #info-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 20;
    width: 350px;
    background: rgba(8, 8, 16, 0.92);
    backdrop-filter: blur(24px);
    border-left: 1px solid rgba(255,255,255,0.08);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  #info-panel::-webkit-scrollbar { width: 4px; }
  #info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  #info-panel.visible { transform: translateX(0); }

  #info-panel .close-btn {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    backdrop-filter: blur(8px);
    transition: background 0.2s;
  }
  #info-panel .close-btn:hover { background: rgba(0,0,0,0.8); }

  #info-panel .photo-container {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #0a0a14;
    position: relative;
    overflow: hidden;
  }
  #info-panel .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }
  #info-panel .photo-fallback {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: rgba(255,255,255,0.2);
  }
  #info-panel .photo-fallback.visible { display: flex; }
  #info-panel .photo-fallback svg { opacity: 0.3; }
  #info-panel .photo-fallback span { font-size: 12px; font-weight: 300; letter-spacing: 1px; }

  #info-panel .info-body { padding: 22px 24px 28px; }
  #info-panel .description {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    margin-bottom: 20px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #info-panel .species-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
    font-style: italic;
    line-height: 1.3;
  }
  #info-panel .taxonomy {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 16px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }
  #info-panel .kingdom-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  #info-panel .meta-section { display: flex; flex-direction: column; gap: 12px; }
  #info-panel .meta-row { display: flex; align-items: flex-start; gap: 12px; font-size: 13px; }
  #info-panel .meta-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; opacity: 0.35; }
  #info-panel .meta-content { flex: 1; }
  #info-panel .meta-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
    margin-bottom: 2px;
  }
  #info-panel .meta-value { color: rgba(255,255,255,0.8); line-height: 1.4; }
</style>
</head>
<body>

<div id="globe-container"></div>

<header>
  <h1>Life Observed</h1>
  <span class="subtitle">Global biodiversity, seen in real time</span>
</header>

<!-- Stats -->
<div id="stats-panel">
  <h3>Observations</h3>
  <div class="stat-row">
    <span class="label">Total</span>
    <span class="value" id="stat-total">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-row">
    <span class="label"><span class="dot" style="background:rgba(255,255,255,0.9)"></span>Animalia</span>
    <span class="value" id="stat-animalia">0</span>
  </div>
  <div class="stat-row">
    <span class="label"><span class="dot" style="background:rgba(200,230,210,0.9)"></span>Plantae</span>
    <span class="value" id="stat-plantae">0</span>
  </div>
  <div class="stat-row">
    <span class="label"><span class="dot" style="background:rgba(210,200,240,0.9)"></span>Fungi</span>
    <span class="value" id="stat-fungi">0</span>
  </div>
  <div class="stat-row">
    <span class="label"><span class="dot" style="background:rgba(255,255,255,0.5)"></span>Other</span>
    <span class="value" id="stat-other">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-row">
    <span class="label">Countries</span>
    <span class="value" id="stat-countries">0</span>
  </div>
</div>

<div id="loading-indicator">
  <div class="spinner"></div>
  <span id="loading-text">Fetching…</span>
</div>

<!-- ═══ Period selector ═══ -->
<div id="period-bar">
  <span class="period-label">Period</span>
  <button class="period-btn" onclick="loadPeriod('today')">Today</button>
  <button class="period-btn" onclick="loadPeriod('week')">This Week</button>
  <button class="period-btn" onclick="loadPeriod('month')">This Month</button>
  <div class="separator"></div>
  <button class="period-btn" onclick="loadPeriod('2026-01')">Jan</button>
  <button class="period-btn active" onclick="loadPeriod('2026-02')">Feb</button>
  <button class="period-btn" onclick="loadPeriod('2026-03')">Mar</button>
  <div class="separator"></div>
  <input type="date" class="period-date-input" id="date-picker" onchange="loadSpecificDate(this.value)">
  <span class="record-count" id="record-count"></span>
</div>

<!-- ═══ Detail panel ═══ -->
<div id="info-overlay" onclick="closeInfoPanel()"></div>
<div id="info-panel">
  <div class="photo-container">
    <button class="close-btn" onclick="closeInfoPanel()">&times;</button>
    <img id="info-thumb" src="" alt="" onload="this.style.opacity=1" onerror="handleThumbError()">
    <div class="photo-fallback" id="info-fallback">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>No photo available</span>
    </div>
  </div>
  <div class="info-body">
    <div class="species-name" id="info-species"></div>
    <div class="taxonomy" id="info-taxonomy"></div>
    <span class="kingdom-badge" id="info-kingdom"></span>
    <div class="description" id="info-description"></div>
    <div class="meta-section">
      <div class="meta-row">
        <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <div class="meta-content">
          <div class="meta-label">Date</div>
          <div class="meta-value" id="info-date"></div>
        </div>
      </div>
      <div class="meta-row">
        <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <div class="meta-content">
          <div class="meta-label">Location</div>
          <div class="meta-value" id="info-country"></div>
        </div>
      </div>
      <div class="meta-row">
        <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <div class="meta-content">
          <div class="meta-label">Observer</div>
          <div class="meta-value" id="info-observer"></div>
        </div>
      </div>
      <div class="meta-row">
        <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20M2 12h20"/>
        </svg>
        <div class="meta-content">
          <div class="meta-label">Coordinates</div>
          <div class="meta-value" id="info-coords"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   Globe setup
   ═══════════════════════════════════════ */
let _now = 0; // current time in seconds, updated by animation loop

const globe = Globe()
  .globeImageUrl('https://unpkg.com/three-globe@2.31.3/example/img/earth-night.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe@2.31.3/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe@2.31.3/example/img/night-sky.png')
  .showAtmosphere(true)
  .atmosphereColor('#334488')
  .atmosphereAltitude(0.2)
  .pointsData([])
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(d => {
    const breath = 0.55 + 0.45 * Math.sin(_now * d._speed + d._phase);
    const r = Math.round(d._cr * breath);
    const g = Math.round(d._cg * breath);
    const b = Math.round(d._cb * breath);
    return `rgb(${r},${g},${b})`;
  })
  .pointRadius(d => {
    const breath = 0.6 + 0.4 * Math.sin(_now * d._speed + d._phase);
    return d._baseRadius * breath;
  })
  .pointAltitude(d => {
    const breath = 0.5 + 0.5 * Math.sin(_now * d._speed + d._phase);
    return 0.001 + 0.004 * breath;
  })
  .pointsMerge(false)
  .pointsTransitionDuration(0)
  .onPointClick(handlePointClick)
  (document.getElementById('globe-container'));

const controls = globe.controls();
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.enableDamping = true;
controls.dampingFactor = 0.1;

globe.pointOfView({ lat: 25, lng: 140, altitude: 2.2 });

/* ═══════════════════════════════════════
   Data & state
   ═══════════════════════════════════════ */
let allPoints = [];
let currentPeriod = '2026-02';

// ── Dawn reveal state ──
let _revealPool = [];        // sorted points waiting to be revealed
let _revealIndex = 0;        // current position in reveal pool
let _revealActive = false;   // whether reveal is in progress
let _lastReveal = 0;         // timestamp of last reveal batch
const REVEAL_BATCH = 60;     // points per reveal batch
const REVEAL_INTERVAL = 60;  // ms between batches (~1000 pts/sec)

// Returns RGB components for soft white light with subtle tint
function pointColorRGB(kingdom) {
  switch (kingdom) {
    case 'Animalia': return [238, 238, 255];
    case 'Plantae':  return [238, 255, 238];
    case 'Fungi':    return [238, 221, 255];
    default:         return [255, 255, 255];
  }
}

function buildDateRange(period) {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  const todayStr = `${y}-${m}-${d}`;

  if (period === 'today') {
    return todayStr;
  }
  if (period === 'week') {
    const weekAgo = new Date(today);
    weekAgo.setDate(weekAgo.getDate() - 7);
    const wy = weekAgo.getFullYear();
    const wm = String(weekAgo.getMonth() + 1).padStart(2, '0');
    const wd = String(weekAgo.getDate()).padStart(2, '0');
    return `${wy}-${wm}-${wd},${todayStr}`;
  }
  if (period === 'month') {
    return `${y}-${m}-01,${todayStr}`;
  }
  // Specific month like '2026-01'
  if (/^\d{4}-\d{2}$/.test(period)) {
    const lastDay = new Date(parseInt(period.slice(0,4)), parseInt(period.slice(5,7)), 0).getDate();
    return `${period}-01,${period}-${lastDay}`;
  }
  // Specific date like '2026-01-15'
  return period;
}

const MAX_POINTS = Infinity;  // fetch all available

function mapRecord(r, i) {
  const thumbUrl = (r.media && r.media.length > 0) ? (r.media[0].identifier || '') : '';
  const rgb = pointColorRGB(r.kingdom);
  const dayNum = r.eventDate ? new Date(r.eventDate).getTime() / 86400000 : 0;
  const phase = (dayNum * 1.3 + i * 0.7) % (Math.PI * 2);
  const speed = 0.4 + Math.random() * 0.4;
  return {
    lat: r.decimalLatitude,
    lng: r.decimalLongitude,
    _cr: rgb[0], _cg: rgb[1], _cb: rgb[2],
    _baseRadius: 0.08 + Math.random() * 0.06,
    _phase: phase,
    _speed: speed,
    kingdom: r.kingdom || 'Unknown',
    species: r.species || r.scientificName || 'Unknown species',
    class_: r['class'] || '',
    order: r.order || '',
    family: r.family || '',
    eventDate: r.eventDate
      ? new Date(r.eventDate).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
      : '',
    country: r.country || 'Unknown',
    observer: r.recordedBy || 'Unknown observer',
    thumbUrl,
  };
}

let _fetchId = 0;

// 世界中に散らばる代表国（6大陸カバー）
const WORLD_COUNTRIES = [
  'US','CA','MX','BR','AR','CO','CR',           // Americas
  'GB','DE','FR','ES','NL','SE','NO','IT','PT',  // Europe
  'JP','CN','IN','TW','TH','SG','IL',            // Asia
  'AU','NZ',                                      // Oceania
  'ZA','KE',                                      // Africa
  'RU',                                            // Russia
];

async function fetchData(period) {
  const myFetchId = ++_fetchId;
  showLoading(true);
  allPoints = [];
  _revealPool = [];
  _revealIndex = 0;
  _revealActive = false;
  _mergeMode = false;
  globe.pointsMerge(false);
  globe.pointsData([]);

  const dateRange = buildDateRange(period);
  const base = 'https://api.gbif.org/v1/occurrence/search'
    + '?hasCoordinate=true'
    + '&basisOfRecord=HUMAN_OBSERVATION&limit=300'
    + '&eventDate=' + dateRange;

  // Fetch all countries in parallel, all at once
  console.log(`[GBIF] Fetching ${WORLD_COUNTRIES.length} countries in parallel...`);

  const promises = WORLD_COUNTRIES.map(async (cc) => {
    try {
      const resp = await fetch(base + '&country=' + cc);
      const data = await resp.json();
      return {
        country: cc,
        total: data.count || 0,
        results: (data.results || [])
          .filter(r => r.decimalLatitude != null && r.decimalLongitude != null)
      };
    } catch(e) {
      return { country: cc, total: 0, results: [] };
    }
  });

  try {
    const allResults = await Promise.all(promises);
    if (myFetchId !== _fetchId) return;

    // Map all results to points
    let allFetched = [];
    for (const { results } of allResults) {
      for (const r of results) {
        allFetched.push(mapRecord(r, allFetched.length));
      }
    }

    // Sort by longitude descending (east→west: Japan→Asia→Europe→Americas)
    allFetched.sort((a, b) => b.lng - a.lng);

    // Start dawn reveal animation
    _revealPool = allFetched;
    _revealIndex = 0;
    _revealActive = true;
    allPoints = [];

    // Slow rotation during reveal
    controls.autoRotateSpeed = 0.15;

    // Point camera toward Japan to see the dawn begin
    globe.pointOfView({ lat: 25, lng: 140, altitude: 2.2 }, 1500);

    const countryCount = new Set(allFetched.map(p => p.country)).size;
    console.log(`[Dawn] ${allFetched.length} points ready, revealing east→west across ${countryCount} countries`);

  } catch(e) {
    console.error('[GBIF] Fetch error:', e);
    document.getElementById('record-count').textContent = 'Fetch error — try reloading';
  }

  if (myFetchId === _fetchId) {
    showLoading(false);
  }
}

/* ═══════════════════════════════════════
   Period selector
   ═══════════════════════════════════════ */
function loadPeriod(period) {
  currentPeriod = period;

  // Update active button
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  const allBtns = document.querySelectorAll('.period-btn');
  allBtns.forEach(b => {
    const onclick = b.getAttribute('onclick') || '';
    if (onclick.includes(`'${period}'`)) b.classList.add('active');
  });

  document.getElementById('date-picker').value = '';
  fetchData(period);
}

function loadSpecificDate(dateStr) {
  if (!dateStr) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  fetchData(dateStr);
}

/* ═══════════════════════════════════════
   Stats
   ═══════════════════════════════════════ */
function updateStats() {
  const counts = { Animalia:0, Plantae:0, Fungi:0, Other:0 };
  const cset = new Set();
  for (const p of allPoints) {
    const k = ['Animalia','Plantae','Fungi'].includes(p.kingdom) ? p.kingdom : 'Other';
    counts[k]++;
    if (p.country && p.country !== 'Unknown') cset.add(p.country);
  }
  document.getElementById('stat-total').textContent     = allPoints.length.toLocaleString();
  document.getElementById('stat-animalia').textContent   = counts.Animalia.toLocaleString();
  document.getElementById('stat-plantae').textContent    = counts.Plantae.toLocaleString();
  document.getElementById('stat-fungi').textContent      = counts.Fungi.toLocaleString();
  document.getElementById('stat-other').textContent      = counts.Other.toLocaleString();
  document.getElementById('stat-countries').textContent   = cset.size.toLocaleString();
}

/* ═══════════════════════════════════════
   Info panel (point click)
   ═══════════════════════════════════════ */
function handlePointClick(point) {
  if (!point) return;

  controls.autoRotate = false;
  clearTimeout(window._rt);
  window._rt = setTimeout(() => { controls.autoRotate = true; }, 12000);

  document.getElementById('info-species').textContent = point.species;

  const tax = [point.kingdom, point.class_, point.order, point.family].filter(Boolean);
  document.getElementById('info-taxonomy').textContent = tax.join(' › ');

  const badge = document.getElementById('info-kingdom');
  badge.textContent = point.kingdom;
  badge.style.background = 'rgba(255,255,255,0.06)';
  badge.style.color = 'rgba(255,255,255,0.6)';
  badge.style.border = '1px solid rgba(255,255,255,0.1)';

  const obs = point.observer !== 'Unknown observer' ? point.observer : 'An observer';
  const short = obs.length > 30 ? obs.substring(0,30) + '…' : obs;
  document.getElementById('info-description').textContent =
    `${short} observed ${point.species} in ${point.country}.`;

  document.getElementById('info-date').textContent     = point.eventDate;
  document.getElementById('info-country').textContent   = point.country;
  document.getElementById('info-observer').textContent  = point.observer;
  document.getElementById('info-coords').textContent    = `${point.lat.toFixed(4)}°, ${point.lng.toFixed(4)}°`;

  const thumb = document.getElementById('info-thumb');
  const fb    = document.getElementById('info-fallback');
  if (point.thumbUrl) {
    thumb.style.opacity = 0;
    thumb.style.display = 'block';
    fb.classList.remove('visible');
    thumb.src = point.thumbUrl;
  } else {
    thumb.style.display = 'none';
    fb.classList.add('visible');
  }

  document.getElementById('info-panel').classList.add('visible');
  document.getElementById('info-overlay').classList.add('visible');
  globe.pointOfView({ lat: point.lat, lng: point.lng, altitude: 1.5 }, 1000);
}

function handleThumbError() {
  document.getElementById('info-thumb').style.display = 'none';
  document.getElementById('info-fallback').classList.add('visible');
}

function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('info-overlay').classList.remove('visible');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInfoPanel(); });

/* ═══════════════════════════════════════
   Loading & Resize
   ═══════════════════════════════════════ */
function showLoading(v) {
  document.getElementById('loading-indicator').style.display = v ? 'flex' : 'none';
}

window.addEventListener('resize', () => {
  globe.width(window.innerWidth).height(window.innerHeight);
});

/* ═══════════════════════════════════════
   Breathing animation loop
   ═══════════════════════════════════════ */
let _lastPulse = 0;
let _mergeMode = false;

function breathe(ts) {
  requestAnimationFrame(breathe);
  _now = ts / 1000;

  // ── Dawn reveal: add points gradually (east→west) ──
  if (_revealActive && ts - _lastReveal > REVEAL_INTERVAL) {
    _lastReveal = ts;
    const end = Math.min(_revealIndex + REVEAL_BATCH, _revealPool.length);
    for (let i = _revealIndex; i < end; i++) {
      allPoints.push(_revealPool[i]);
    }
    _revealIndex = end;

    // Update stats and count live during reveal
    updateStats();
    const countryCount = new Set(allPoints.map(p => p.country)).size;
    document.getElementById('record-count').innerHTML =
      `<strong>${allPoints.length.toLocaleString()}</strong> / ${_revealPool.length.toLocaleString()} observations · ${countryCount} countries`;

    if (_revealIndex >= _revealPool.length) {
      _revealActive = false;
      controls.autoRotateSpeed = 0.4;
      document.getElementById('record-count').innerHTML =
        `<strong>${allPoints.length.toLocaleString()}</strong> observations · ${countryCount} countries`;
      console.log('[Dawn] Reveal complete:', allPoints.length, 'points');
    }
  }

  // Switch to merge mode when points get heavy
  if (!_mergeMode && allPoints.length > 2000) {
    _mergeMode = true;
    globe.pointsMerge(true);
  }

  // Breathing animation
  const interval = _mergeMode ? 500 : (allPoints.length > 1000 ? 200 : 150);
  if (ts - _lastPulse > interval) {
    _lastPulse = ts;
    if (allPoints.length > 0) {
      globe.pointsData(allPoints);
    }
  }
}
requestAnimationFrame(breathe);

/* ═══════════════════════════════════════
   Init — load this month's data
   ═══════════════════════════════════════ */
loadPeriod('2026-02');
</script>
